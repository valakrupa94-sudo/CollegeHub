<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Login - CollegeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        body { 
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; font-family: 'Poppins', sans-serif; color: white;
        }

        .bg-animated {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('images/back.jpg'); 
            background-size: cover; background-position: center; z-index: -2;
            animation: kenBurns 8s infinite alternate ease-in-out;
        }

        @keyframes kenBurns { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }

        .orb {
            position: absolute; width: 300px; height: 300px;
            background: linear-gradient(135deg, rgba(220, 53, 69, 0.3), rgba(255, 193, 7, 0.2));
            filter: blur(80px); border-radius: 50%; z-index: -1;
            animation: floatOrb 8s infinite alternate ease-in-out;
        }

        @keyframes floatOrb { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }

        .login-card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px; padding: 45px; width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); animation: fadeInUp 1s ease-out;
        }

        .nav-tabs { border: none; margin-bottom: 30px; }
        .nav-tabs .nav-link { color: rgba(255, 255, 255, 0.6) !important; border: none; font-weight: 600; font-size: 1.1rem; transition: 0.3s; }
        .nav-tabs .nav-link.active { background: transparent !important; color: white !important; border-bottom: 3px solid #dc3545 !important; opacity: 1; }

        .form-control, .form-select { 
            background: rgba(255, 255, 255, 0.08) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            color: white !important;
            border-radius: 12px; padding: 12px; margin-bottom: 15px;
            appearance: none; -webkit-appearance: none;
        }

        .form-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='white'%3e%3cpath fill-rule='evenodd' d='M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e") !important;
            background-repeat: no-repeat !important; background-position: right 0.75rem center !important; background-size: 16px 12px !important;
        }

        .form-control::placeholder { color: rgba(255, 255, 255, 0.6); }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.15) !important;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.4);
            border-color: #dc3545; outline: none;
        }

        .form-select option { background-color: #212529 !important; color: white !important; }

        .btn-custom { border-radius: 12px; padding: 14px; font-weight: bold; text-transform: uppercase; transition: 0.4s; border: none; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-login, .btn-register { background: linear-gradient(45deg, #dc3545, #ff4d5a) !important; color: white !important; }
        .btn-custom:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3); color: white !important; }

        /* --- Captcha Styling (Teacher Red Theme) --- */
        .captcha-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #captchaDisplay {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 5px;
            color: #ff4d5a; /* Reddish color for teacher theme */
            user-select: none;
            font-style: italic;
            text-decoration: line-through;
        }
        .refresh-btn {
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            transition: 0.3s;
        }
        .refresh-btn:hover { color: white; transform: rotate(180deg); }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1.5s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-loading .loading-text { display: none; }
        .btn-loading .spinner { display: block; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .back-link { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <div class="orb"></div>

    <div class="login-card">
        <h2 class="text-center mb-4 fw-bold">TEACHER ZONE</h2>
        
        <ul class="nav nav-tabs justify-content-center">
            <li class="nav-item"><a class="nav-link active" id="lTab" href="#" onclick="showForm('login')">Login</a></li>
            <li class="nav-item"><a class="nav-link" id="rTab" href="#" onclick="showForm('register')">Register</a></li>
        </ul>

        <div id="loginForm">
            <input type="email" id="lEmail" class="form-control" placeholder="Email Address">
            <input type="password" id="lPass" class="form-control" placeholder="Password">
            
            <div class="captcha-box">
                <span id="captchaDisplay"></span>
                <i class="fas fa-sync-alt refresh-btn" onclick="generateCaptcha()" title="Refresh Captcha"></i>
            </div>
            <input type="text" id="lCaptchaInput" class="form-control" placeholder="Enter Captcha Code">

            <button class="btn btn-danger w-100 btn-custom btn-login mt-2" id="loginBtn" onclick="auth('login')">
                <span class="loading-text">Sign In</span>
                <div class="spinner"></div>
            </button>
        </div>

        <div id="registerForm" style="display:none;">
            <input type="email" id="rEmail" class="form-control" placeholder="Enter Your Email">
            <input type="password" id="rPass" class="form-control" placeholder="Create Password">
            
            <select id="rDept" class="form-select">
                <option value="" disabled selected>Select Department</option>
                <option value="Computer Engineering">Computer Engineering</option>
                <option value="Information Technology">Information Technology</option>
                <option value="Civil Engineering">Civil Engineering</option>
                <option value="Mechanical Engineering">Mechanical Engineering</option>
                <option value="Electrical Engineering">Electrical Engineering</option>
                <option value="Chemical Engineering">Chemical Engineering</option>
                <option value="General Department">General Department</option>
            </select>

            <input type="text" id="rEmpId" class="form-control" placeholder="Professor ID / Employee ID">
            <button class="btn btn-danger w-100 btn-custom btn-register mt-2" id="registerBtn" onclick="auth('register')">
                <span class="loading-text">Register as Teacher</span>
                <div class="spinner"></div>
            </button>
        </div>

        <a href="welcome.html" class="d-block text-center mt-4 back-link">
            <i class="fas fa-arrow-left me-2"></i>Exit to Home
        </a>
    </div>

    <script>
        // ૧. captcha generate logic
        let currentCaptcha = "";
        function generateCaptcha() {
            const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
            let code = "";
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = code;
            document.getElementById("captchaDisplay").innerText = code;
            document.getElementById("lCaptchaInput").value = "";
        }

        window.onload = generateCaptcha;

        function showForm(type) {
            document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
            document.getElementById('lTab').classList.toggle('active', type === 'login');
            document.getElementById('rTab').classList.toggle('active', type === 'register');
            if(type === 'login') generateCaptcha();
        }

        async function auth(type) {
            const btn = document.getElementById(type === 'login' ? 'loginBtn' : 'registerBtn');
            const url = type === 'login' ? '/auth/login' : '/auth/register';
            
            // ૨. captcha verification (only for login)
            if(type === 'login') {
                const userInput = document.getElementById("lCaptchaInput").value;
                if(userInput !== currentCaptcha) {
                    alert("Invalid Captcha! Please try again.");
                    generateCaptcha();
                    return;
                }
            }

            const body = {
                role: 'teacher',
                email: document.getElementById(type === 'login' ? 'lEmail' : 'rEmail').value,
                password: document.getElementById(type === 'login' ? 'lPass' : 'rPass').value
            };

            if(type === 'register') {
                body.department = document.getElementById('rDept').value;
                body.employeeId = document.getElementById('rEmpId').value;
                if(!body.department || !body.employeeId) return alert("Please fill all details!");
            }

            btn.classList.add('btn-loading');
            btn.disabled = true;

            try {
                const [res] = await Promise.all([
                    fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) }),
                    new Promise(resolve => setTimeout(resolve, 2000))
                ]);

                if(res.ok) { 
                    if(type === 'register') { 
                        alert("Teacher Registered! 🎉 Please Login."); 
                        showForm('login'); 
                        btn.classList.remove('btn-loading');
                        btn.disabled = false;
                    } else {
                        window.location.href = '/index.html'; 
                    }
                } else { 
                    alert("Authentication Failed!"); 
                    generateCaptcha();
                    btn.classList.remove('btn-loading');
                    btn.disabled = false;
                }
            } catch (err) { 
                alert("Server Error!"); 
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
