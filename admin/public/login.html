<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - CollegeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        /* ૧. એનિમેટેડ બેકગ્રાઉન્ડ સેટઅપ */
        .bg-animated {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('/images/back.jpg'); /* તમારી ઈમેજ પાથ */
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: backgroundZoom 6s infinite alternate ease-in-out;
        }

        @keyframes backgroundZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        body { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* ૨. હલતા સર્કલ્સ */
        .bg-circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            z-index: -1;
            animation: moveCircles 15s infinite linear;
        }

        @keyframes moveCircles {
            from { transform: translateY(0); }
            to { transform: translateY(-100vh) rotate(360deg); }
        }

        /* ૩. ગ્લાસિકલ લોગિન કાર્ડ */
        .login-card {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 30px;
            padding: 50px 40px; 
            width: 400px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control {
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .form-control:focus { 
            background: rgba(255, 255, 255, 0.15); 
            color: white; 
            border-color: #ffd700; 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); 
            outline: none;
        }

        /* ગોલ્ડન બટન સ્ટાઇલ */
        .btn-gold {
            background: linear-gradient(45deg, #ffd700, #ff8c00); 
            border: none;
            font-weight: 800; 
            padding: 15px; 
            border-radius: 15px; 
            width: 100%; 
            color: #000;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
            filter: brightness(1.1);
        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
        }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <div class="bg-circle" style="width: 100px; height: 100px; left: 10%; bottom: -5%;"></div>
    <div class="bg-circle" style="width: 200px; height: 200px; right: 5%; top: 10%;"></div>

    <div class="login-card">
        <h2 class="mb-4 fw-bold text-white">
            <i class="fas fa-user-shield me-2 text-warning"></i>Admin <span class="text-warning">Login</span>
        </h2>
        <input type="email" id="email" class="form-control" placeholder="Admin Email">
        <input type="password" id="pass" class="form-control" placeholder="Password">
        <button class="btn-gold shadow" onclick="login()">LOGIN</button>
    </div>

    <script>
        async function login() {
            const emailValue = document.getElementById('email').value;
            const passValue = document.getElementById('pass').value;

            if(!emailValue || !passValue) {
                alert("Please fill all fields!");
                return;
            }

            try {
                const res = await fetch('/auth/admin-login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        email: emailValue, 
                        pass: passValue 
                    })
                });

                const data = await res.json();

                if(res.ok && data.success) {
                    window.location.href = '/'; 
                } else {
                    alert("Invalid Admin Credentials!");
                }
            } catch (err) {
                console.error("Login Error:", err);
                alert("Connection Error. Try again.");
            }
        }
    </script>
</body>
</html>
